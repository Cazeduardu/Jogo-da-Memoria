<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Memória</title>
    <style>
        body { background-color: #f4f4f4; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .memory-game { width: 640px; height: 640px; display: flex; flex-wrap: wrap; perspective: 1000px; margin-top: 20px; }
        
        .memory-card {
            width: calc(25% - 10px); height: calc(25% - 10px);
            margin: 5px; position: relative; transform-style: preserve-3d;
            transition: transform .5s; cursor: pointer;
        }

        /* Classe que vira a carta */
        .memory-card.flip { transform: rotateY(180deg); }

        .front-face, .back-face {
            width: 100%; height: 100%; padding: 20px; position: absolute;
            border-radius: 5px; background: #2c3e50; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; font-size: 40px; box-sizing: border-box;
        }

        .front-face { transform: rotateY(180deg); background-color: #ecf0f1; }
    </style>
</head>
<body>
    <h1>Jogo da Memória</h1>
    <div class="memory-game">
        {% for icone in cartas %}
        <div class="memory-card" data-framework="{{ icone }}">
            <div class="front-face">{{ icone }}</div>
            <div class="back-face">❓</div>
        </div>
        {% endfor %}
    </div>

    <script>
        const cards = document.querySelectorAll('.memory-card');
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flip');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flip');
                secondCard.classList.remove('flip');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        cards.forEach(card => card.addEventListener('click', flipCard));
    </script>
</body>
</html>
